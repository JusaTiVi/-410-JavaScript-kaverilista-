<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaverilista</title>
</head>
<body>
    <nav>
        <a href="versio-1.html">Versio 1</a>
        <a href="index.html">Versio 2</a>
    </nav>
    
    <h1>Kaverilista V.2</h1>
    
    <hr>

    <p>Anna nimi:</p>
        <input type="text" name="nimi" id="nimi">
        <button onclick="lisaa()">Lisää Kaveri</button>
        <button onclick="poista()">Poista Kaveri</button>
        <button onclick="jarjesta()">Järjestä Kaverit</button>

    <ul id="kaverit"></ul>

    <script>
        function lisaa() {
            var kaverilista =
                document.getElementById("kaverit");
            var nimi =
                document.getElementById("nimi");
            var li = 
                document.createElement("li");
            li.setAttribute('id', nimi.value);
            li.appendChild(document.createTextNode(nimi.value));
            if (nimi.value == "" || nimi.value == null) {
                return
            }
            kaverilista.appendChild(li);
        }

        function poista() {
            var kaverilista = 
                document.getElementById("kaverit");
            var nimi = 
                document.getElementById("nimi");
            var item = 
                document.getElementById(nimi.value);
            kaverilista.removeChild(item);
        }
        function jarjesta() {
            var kaverilista, i, switching, b, shouldSwitch;
            kaverilista = document.getElementById("kaverit")
            switching = true;
            while (switching) {
                switching = false;
                nimet = kaverilista.getElementsByTagName("LI");
                for (i = 0; i < (nimet.length - 1); i++) {
                    shouldSwitch = false;
                    if (nimet[i].innerHTML.toLowerCase() > nimet[i + 1].innerHTML.toLowerCase()) {
                        shouldSwitch = true;
                        break;
                    }
                }
                if (shouldSwitch) {
                    nimet[i].parentNode.insertBefore(nimet[i + 1], nimet[i]);
                    switching = true;
                }
            }
        }
    </script>
    
</body>
</html>
